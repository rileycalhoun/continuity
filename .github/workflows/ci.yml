name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proxy-tests:
    name: Proxy tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Test Worldline proxy code
        working-directory: proxy
        run: ./gradlew :velocity-proxy:test --tests "com.velocitypowered.proxy.worldline.*"

      - name: Test full proxy suite
        working-directory: proxy
        run: ./gradlew :velocity-proxy:test

  server-build:
    name: Server compile
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Apply server patches
        working-directory: server
        run: |
          git config --global user.email "no-reply@github.com"
          git config --global user.name "GitHub Actions"
          ./gradlew applyPatches

      - name: Compile server
        working-directory: server
        run: ./gradlew :paper-server:compileJava
